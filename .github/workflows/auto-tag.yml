name: Auto Tag on Push

on:
  push:
    branches:
      - master

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag, default to v1.3.10 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.3.10")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      
      - name: Calculate next version
        id: next_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          # Strip 'v' prefix
          VERSION="${LATEST_TAG#v}"
          
          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Check commit message for version bump type
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$COMMIT_MSG" =~ ^(BREAKING|major): ]] || [[ "$COMMIT_MSG" =~ \[major\] ]]; then
            # Major version bump
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$COMMIT_MSG" =~ ^(feat|feature): ]] || [[ "$COMMIT_MSG" =~ \[minor\] ]]; then
            # Minor version bump
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            # Patch version bump (default for fix, chore, docs, etc.)
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"
      
      - name: Check if tag already exists
        id: check_tag
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_version }}"
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $NEW_TAG already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $NEW_TAG does not exist, will create..."
          fi
      
      - name: Update composer.json version
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.next_version.outputs.version_no_v }}"
          # Update version in composer.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" composer.json
          
          # Check if anything changed
          if git diff --quiet composer.json; then
            echo "No version change needed"
          else
            echo "Updated composer.json to version $VERSION"
          fi
      
      - name: Commit version bump
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.next_version.outputs.version_no_v }}"
          if ! git diff --quiet composer.json; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add composer.json
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push origin master
          fi
      
      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_version }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG" -m "$COMMIT_MSG"
          git push origin "$NEW_TAG"
          echo "Created and pushed tag: $NEW_TAG"
